// We'll use k.drawRect, k.drawCircle etc. in render — but for game objects
// we use custom "pixel art" via sprite definitions using k.loadSprite with data URLs

function makeSpriteDataURL(pixels, w, h, scale = 4) {
  const canvas = document.createElement("canvas");
  canvas.width = w * scale;
  canvas.height = h * scale;
  const ctx = canvas.getContext("2d");
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const color = pixels[y * w + x];
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * scale, y * scale, scale, scale);
      }
    }
  }
  return canvas.toDataURL();
}

function makeSpritesheetDataURL(pixelFrames, w, h, scale = 4) {
  const numFrames = pixelFrames.length;
  const canvas = document.createElement("canvas");
  canvas.width = w * scale * numFrames;
  canvas.height = h * scale;
  const ctx = canvas.getContext("2d");
  pixelFrames.forEach((pixels, fi) => {
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const color = pixels[y * w + x];
        if (color) {
          ctx.fillStyle = color;
          ctx.fillRect((fi * w + x) * scale, y * scale, scale, scale);
        }
      }
    }
  });
  return canvas.toDataURL();
}

// ─── LOAD SOUNDS (simple beeps via AudioContext) ───
// We'll use k.burp substitute — simple procedural audio
function playBeep(freq = 440, dur = 0.05, type = "square", vol = 0.15) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

// ─── SCENES ───

// TITLE SCENE
k.scene("title", () => {
  const W = k.width();
  const H = k.height();
  k.add([k.rect(W, H), k.color(0,0,0), k.pos(0,0), k.fixed(), k.z(-10)]);

  // Scanline effect
  for (let y = 0; y < H; y += 4) {
    k.add([
      k.rect(W, 1),
      k.color(0, 255, 65),
      k.opacity(0.03),
      k.pos(0, y),
      k.fixed(),
      k.z(-9),
    ]);
  }

  k.add([
    k.text("BEIGE", { size: 52, font: "'Monaspace Neon', monospace" }),
    k.color(0, 255, 65),
    k.pos(W / 2, H * 0.21),
    k.anchor("center"),
  ]);
  k.add([
    k.text("INVADERS", { size: 52, font: "'Monaspace Neon', monospace" }),
    k.color(0, 255, 65),
    k.pos(W / 2, H * 0.32),
    k.anchor("center"),
  ]);

  // Score table
  const scoreTable = [
    { sprite: "ufo",    label: "= ? MYSTERY",  color: [255, 23, 68] },
    { sprite: "enemyC", label: "= 30 POINTS",  color: [0, 229, 255] },
    { sprite: "enemyB", label: "= 20 POINTS",  color: [255, 235, 59] },
    { sprite: "enemyA", label: "= 10 POINTS",  color: [255, 110, 199] },
  ];

  scoreTable.forEach((row, i) => {
    k.add([k.sprite(row.sprite), k.pos(W / 2 - 100, H * 0.46 + i * 44), k.scale(0.7), k.anchor("center")]);
    k.add([
      k.text(row.label, { size: 14, font: "monospace" }),
      k.color(...row.color),
      k.pos(W / 2 - 40, H * 0.46 + i * 44),
      k.anchor("left"),
    ]);
  });

  const blink = k.add([
    k.text("< PRESS SPACE TO PLAY >", { size: 14, font: "monospace" }),
    k.color(255, 255, 255),
    k.pos(W / 2, H * 0.82),
    k.anchor("center"),
  ]);

  let blinkTimer = 0;
  k.onUpdate(() => {
    blinkTimer += k.dt();
    blink.opacity = Math.sin(blinkTimer * 4) > 0 ? 1 : 0;
  });

  k.onKeyPress("space", () => k.go("game"));
});

// GAME SCENE
k.scene("game", (data = {}) => {
  const GAME_W = k.width();
  const GAME_H = k.height();
  const ENEMY_ROWS = 5;
  const ENEMY_W = 60;
  const ENEMY_H = 60;
  const GUTTER = 60;
  const ENEMY_COLS = Math.floor((GAME_W - GUTTER * 2) / ENEMY_W);
  const START_X = Math.floor((GAME_W - ENEMY_COLS * ENEMY_W) / 2);
  const START_Y = 90;

  let score = data.score || 0;
  let lives = data.lives !== undefined ? data.lives : 3;
  let level = data.level || 1;
  let hiScore = data.hiScore || 0;

  // State
  let enemies = [];
  let bullets = [];
  let enemyBullets = [];
  let shields = [];
  let ufoObj = null;
  let playerObj = null;
  let canShoot = true;
  let shootCooldown = 0;
  let enemyDir = 1;
  let enemyMoveTimer = 0;
  let enemyMoveInterval = Math.max(0.08, 0.5 - (level - 1) * 0.05);
  let enemyFrame = 0;
  let enemyDropQueued = false;
  let ufoTimer = 0;
  let ufoInterval = k.rand(15, 25);
  let gameOver = false;
  let playerDead = false;
  let playerDeadTimer = 0;
  let stepSound = 0;
  const stepFreqs = [160, 130, 100, 80];
  let alienCount = ENEMY_COLS * ENEMY_ROWS;
  let aliensBulletChance = 0.003 + (level - 1) * 0.001;

  // Background
  k.add([k.rect(GAME_W, GAME_H), k.color(0, 0, 0), k.pos(0, 0), k.fixed(), k.z(-10)]);

  // HUD
  const scoreTxt = k.add([
    k.text(`SCORE  ${String(score).padStart(4,"0")}`, { size: 13, font: "monospace" }),
    k.color(255, 255, 255),
    k.pos(8, 6),
    k.fixed(), k.z(10),
  ]);
  const hiTxt = k.add([
    k.text(`HI  ${String(Math.max(hiScore, score)).padStart(4,"0")}`, { size: 13, font: "monospace" }),
    k.color(255, 255, 255),
    k.pos(GAME_W / 2, 6),
    k.anchor("top"),
    k.fixed(), k.z(10),
  ]);
  const livesLabel = k.add([
    k.text("LIVES", { size: 13, font: "monospace" }),
    k.color(255, 255, 255),
    k.pos(GAME_W - 110, 6),
    k.fixed(), k.z(10),
  ]);

  function renderLives() {
    k.get("lifeIcon").forEach(o => o.destroy());
    for (let i = 0; i < lives; i++) {
      k.add([
        k.sprite("player"),
        k.scale(0.65),
        k.pos(GAME_W - 90 + i * 28, 16),
        k.fixed(), k.z(10),
        "lifeIcon",
      ]);
    }
  }
  renderLives();

  // Ground line
  k.add([k.rect(GAME_W, 2), k.color(0, 255, 65), k.pos(0, GAME_H - 36), k.fixed(), k.z(5)]);

  // Level indicator
  k.add([
    k.text(`LEVEL ${level}`, { size: 12, font: "monospace" }),
    k.color(0, 255, 65),
    k.pos(GAME_W / 2, GAME_H - 24),
    k.anchor("top"),
    k.fixed(), k.z(10),
  ]);

  // Enemy type config per row
  const rowConfig = [
    { type: "C", sprite: "enemyC", pts: 30 },
    { type: "B", sprite: "enemyB", pts: 20 },
    { type: "B", sprite: "enemyB", pts: 20 },
    { type: "A", sprite: "enemyA", pts: 10 },
    { type: "A", sprite: "enemyA", pts: 10 },
  ];

  // Spawn enemies
  for (let row = 0; row < ENEMY_ROWS; row++) {
    for (let col = 0; col < ENEMY_COLS; col++) {
      const cfg = rowConfig[row];
      const e = k.add([
        k.sprite(cfg.sprite),
        k.pos(START_X + col * ENEMY_W, START_Y + row * ENEMY_H + (level - 1) * 10),
        k.area(),
        "enemy",
        {
          row, col,
          pts: cfg.pts,
          alive: true,
        },
      ]);
      enemies.push(e);
    }
  }

  // Shields — 5 evenly spaced across the full screen width
  const NUM_SHIELDS = 5;
  const shieldPositions = Array.from({ length: NUM_SHIELDS }, (_, i) =>
    Math.round(GAME_W * (i + 1) / (NUM_SHIELDS + 1))
  );
  shieldPositions.forEach(sx => {
    // Each shield is a cluster of blocks
    const shieldShape = [
      [0,0],[1,0],[2,0],[3,0],[4,0],
      [0,1],[1,1],[2,1],[3,1],[4,1],
      [0,2],[1,2],[2,2],[3,2],[4,2],
      [0,3],[4,3],
      [0,4],[4,4],
    ];
    shieldShape.forEach(([bx, by]) => {
      const s = k.add([
        k.rect(8, 6),
        k.color(0, 180, 50),
        k.pos(sx - 20 + bx * 8, GAME_H * 0.95 - 95 + by * 7),
        k.area(),
        k.z(4),
        "shield",
      ]);
      shields.push(s);
    });
  });

  // Player
  function spawnPlayer() {
    playerObj = k.add([
      k.sprite("player"),
      k.pos(GAME_W / 2, GAME_H - 58),
      k.anchor("center"),
      k.area(),
      "player",
    ]);
  }
  spawnPlayer();

  // Explosion effect
  function explode(pos, color = [255, 235, 59]) {
    const exp = k.add([
      k.sprite("explosion"),
      k.pos(pos),
      k.anchor("center"),
      k.opacity(1),
      k.z(8),
    ]);
    k.wait(0.4, () => exp.destroy());
  }

  // ─── SHOOTING ───
  k.onKeyPress("space", () => {
    if (gameOver || playerDead || !canShoot) return;
    // Max 1 bullet on screen
    if (k.get("bullet").length > 5) return;
    canShoot = false;
    const b = k.add([
      k.rect(3, 12),
      k.color(0, 255, 65),
      k.pos(playerObj.pos.x, playerObj.pos.y - 20),
      k.anchor("center"),
      k.area(),
      k.move(k.UP, 900),
      k.z(6),
      "bullet",
    ]);
    playBeep(600, 0.06, "square", 0.1);
    k.wait(0.15, () => { canShoot = true; });
  });

  // ─── MOVEMENT ───
  k.onKeyDown("left", () => {
    if (gameOver || playerDead) return;
    playerObj.pos.x = Math.max(22, playerObj.pos.x - 286 * k.dt());
  });
  k.onKeyDown("right", () => {
    if (gameOver || playerDead) return;
    playerObj.pos.x = Math.min(GAME_W - 22, playerObj.pos.x + 286 * k.dt());
  });

  // ─── GAME UPDATE ───
  k.onUpdate(() => {
    if (gameOver) return;

    // Player dead animation
    if (playerDead) {
      playerDeadTimer -= k.dt();
      if (playerDeadTimer <= 0) {
        if (lives <= 0) {
          k.go("gameover", { score, hiScore: Math.max(hiScore, score) });
        } else {
          playerDead = false;
          spawnPlayer();
        }
      }
      return;
    }

    // Enemy movement
    enemyMoveTimer += k.dt();
    const aliveEnemies = enemies.filter(e => e.alive);
    alienCount = aliveEnemies.length;

    if (alienCount === 0) {
      // Next level!
      k.go("game", { score, lives, level: level + 1, hiScore: Math.max(hiScore, score) });
      return;
    }

    // Speed increases as fewer enemies remain
    const speedFactor = Math.max(0.04, enemyMoveInterval * (alienCount / (ENEMY_COLS * ENEMY_ROWS)));

    if (enemyMoveTimer >= speedFactor) {
      enemyMoveTimer = 0;
      enemyFrame = (enemyFrame + 1) % 2;
      playBeep(stepFreqs[stepSound % 4], 0.04, "square", 0.08);
      stepSound++;

      // Check bounds
      let hitWall = false;
      aliveEnemies.forEach(e => {
        e.frame = enemyFrame;
        const nextX = e.pos.x + (enemyDir * 12);
        if (nextX < START_X || nextX > GAME_W - START_X - ENEMY_W) hitWall = true;
      });

      if (hitWall) {
        enemyDir *= -1;
        aliveEnemies.forEach(e => { e.pos.y += 10; });
        // Check if enemies reached bottom
        aliveEnemies.forEach(e => {
          if (e.pos.y > GAME_H - 90) {
            gameOver = true;
            k.go("gameover", { score, hiScore: Math.max(hiScore, score) });
          }
        });
      } else {
        aliveEnemies.forEach(e => { e.pos.x += enemyDir * 12; });
      }
    }

    // Enemy shooting
    if (aliveEnemies.length > 0 && Math.random() < aliensBulletChance) {
      const shooter = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
      const eb = k.add([
        k.rect(3, 10),
        k.color(255, 64, 129),
        k.pos(shooter.pos.x + 22, shooter.pos.y + 32),
        k.anchor("center"),
        k.area(),
        k.move(k.DOWN, 200 + level * 20),
        k.z(6),
        "enemyBullet",
      ]);
    }

    // UFO
    ufoTimer += k.dt();
    if (ufoTimer >= ufoInterval && !ufoObj) {
      ufoTimer = 0;
      ufoInterval = k.rand(15, 25);
      const dir = Math.random() > 0.5 ? 1 : -1;
      const startX = dir === 1 ? -40 : GAME_W + 40;
      ufoObj = k.add([
        k.sprite("ufo"),
        k.pos(startX, 50),
        k.anchor("center"),
        k.area(),
        k.move(dir === 1 ? k.RIGHT : k.LEFT, 120),
        k.z(6),
        "ufo",
      ]);
      playBeep(880, 0.1, "sawtooth", 0.05);
    }
    if (ufoObj) {
      if (ufoObj.pos.x < -60 || ufoObj.pos.x > GAME_W + 60) {
        ufoObj.destroy();
        ufoObj = null;
      }
    }
  });

  // ─── COLLISIONS ───

  // Bullet hits enemy
  k.onCollide("bullet", "enemy", (bullet, enemy) => {
    if (!enemy.alive) return;
    bullet.destroy();
    enemy.alive = false;
    score += enemy.pts;
    hiScore = Math.max(hiScore, score);
    scoreTxt.text = `SCORE  ${String(score).padStart(4,"0")}`;
    hiTxt.text = `HI  ${String(hiScore).padStart(4,"0")}`;
    playBeep(200, 0.12, "square", 0.15);
    explode(k.vec2(enemy.pos.x + 22, enemy.pos.y + 16));
    enemy.destroy();
    canShoot = true;
  });

  // Bullet hits UFO
  k.onCollide("bullet", "ufo", (bullet, ufo) => {
    bullet.destroy();
    const pts = [50, 100, 150, 300][Math.floor(Math.random() * 4)];
    score += pts;
    hiScore = Math.max(hiScore, score);
    scoreTxt.text = `SCORE  ${String(score).padStart(4,"0")}`;
    hiTxt.text = `HI  ${String(hiScore).padStart(4,"0")}`;
    playBeep(880, 0.2, "sawtooth", 0.15);
    explode(k.vec2(ufo.pos.x, ufo.pos.y), [255, 23, 68]);
    // Floating score text
    const floatTxt = k.add([
      k.text(`+${pts}`, { size: 14, font: "monospace" }),
      k.color(255, 23, 68),
      k.pos(ufo.pos.x, ufo.pos.y),
      k.anchor("center"),
      k.z(9),
    ]);
    k.wait(1, () => floatTxt.destroy());
    ufo.destroy();
    ufoObj = null;
    canShoot = true;
  });

  // Bullet hits shield
  k.onCollide("bullet", "shield", (bullet, shield) => {
    bullet.destroy();
    shield.destroy();
    canShoot = true;
  });

  // Enemy bullet hits shield
  k.onCollide("enemyBullet", "shield", (eb, shield) => {
    eb.destroy();
    shield.destroy();
  });

  // Enemy bullet hits player
  k.onCollide("enemyBullet", "player", (eb, player) => {
    if (playerDead) return;
    eb.destroy();
    player.destroy();
    lives--;
    renderLives();
    playerDead = true;
    playerDeadTimer = 1.5;
    playBeep(100, 0.3, "sawtooth", 0.2);
    explode(k.vec2(playerObj.pos.x, playerObj.pos.y), [0, 255, 65]);
  });

  // Enemy bullet goes offscreen
  k.on("update", "enemyBullet", (eb) => {
    if (eb.pos.y > GAME_H) eb.destroy();
  });

  // Bullet goes offscreen
  k.on("update", "bullet", (b) => {
    if (b.pos.y < 0) { b.destroy(); canShoot = true; }
  });

  // Enemy touches player directly
  k.onCollide("enemy", "player", (enemy, player) => {
    if (playerDead) return;
    lives = 0;
    playerDead = true;
    playerDeadTimer = 1.5;
    player.destroy();
    k.wait(1.5, () => {
      k.go("gameover", { score, hiScore: Math.max(hiScore, score) });
    });
  });
});

// GAME OVER SCENE
k.scene("gameover", (data = {}) => {
  const score = data.score || 0;
  const hiScore = data.hiScore || 0;
  const W = k.width();
  const H = k.height();

  k.add([k.rect(W, H), k.color(0, 0, 0), k.pos(0, 0), k.fixed(), k.z(-10)]);

  k.add([
    k.text("GAME OVER", { size: 48, font: "monospace" }),
    k.color(255, 23, 68),
    k.pos(W / 2, H * 0.29),
    k.anchor("center"),
  ]);

  k.add([
    k.text(`SCORE    ${String(score).padStart(5,"0")}`, { size: 18, font: "monospace" }),
    k.color(255, 255, 255),
    k.pos(W / 2, H * 0.46),
    k.anchor("center"),
  ]);

  k.add([
    k.text(`HI SCORE ${String(hiScore).padStart(5,"0")}`, { size: 18, font: "monospace" }),
    k.color(255, 235, 59),
    k.pos(W / 2, H * 0.53),
    k.anchor("center"),
  ]);

  const blink = k.add([
    k.text("PRESS SPACE TO RETRY", { size: 14, font: "monospace" }),
    k.color(0, 255, 65),
    k.pos(W / 2, H * 0.68),
    k.anchor("center"),
  ]);

  let blinkTimer = 0;
  k.onUpdate(() => {
    blinkTimer += k.dt();
    blink.opacity = Math.sin(blinkTimer * 4) > 0 ? 1 : 0;
  });

  k.onKeyPress("space", () => {
    k.go("game", { hiScore });
  });

  k.add([
    k.text("PRESS T FOR TITLE", { size: 12, font: "monospace" }),
    k.color(100, 100, 100),
    k.pos(W / 2, H * 0.75),
    k.anchor("center"),
  ]);
  k.onKeyPress("t", () => k.go("title"));
});

// ─── START ───
k.go("title");
</script>
</body>
</html>
